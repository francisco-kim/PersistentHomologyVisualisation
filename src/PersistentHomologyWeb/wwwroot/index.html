<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Persistent homology visualisation</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/katex/katex.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="app-loading">
            <div class="app-loading-grid"></div>
            <div class="loading-progress-text"></div>
            <p>Loading the .NET WebAssembly runtime…</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="lib/katex/katex.min.js"></script>
    <script>
        // Typesets every [data-katex] element; called by pages after render.
        window.renderKatex = () => {
            document.querySelectorAll('[data-katex]').forEach((el) => {
                katex.render(el.getAttribute('data-katex'), el, {
                    displayMode: el.hasAttribute('data-katex-display'),
                    throwOnError: false
                });
            });
        };
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
