name: Deploy web app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install the wasm-tools workload (AOT)
        run: dotnet workload install wasm-tools

      - name: Run topology tests
        run: dotnet test tests/PersistentHomologyCore.Tests

      - name: Publish (Release, AOT)
        run: dotnet publish src/PersistentHomologyWeb -c Release -p:EnableAot=true -o publish

      - name: Adjust for project-pages hosting
        run: |
          # Served at francisco-kim.github.io/PersistentHomologyVisualisation/
          sed -i 's|<base href="/" />|<base href="/PersistentHomologyVisualisation/" />|' publish/wwwroot/index.html
          # SPA deep links fall back to the app router.
          cp publish/wwwroot/index.html publish/wwwroot/404.html
          # Keep Jekyll away from _framework/.
          touch publish/wwwroot/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
